# Symbiota Production Docker Compose
#
# For production deployment with immutable container images
# Code is baked into the image (Dockerfile.prod)
# Only runtime data directories are mounted
#
# Usage:
#   docker-compose --env-file .env.prod -f docker-compose.prod.yaml up -d
#
# For Quay.io automated deployment:
#   Images are built automatically from v3.2.4-alpha branch
#   Pull and restart to deploy: docker-compose pull && docker-compose up -d

services:
  symbiota:
    # DEFAULT: pull the pinned, pre-built production image from Quay.
    # Pin to an immutable digest in real deployments, e.g.:
    #   image: quay.io/langdon/se-symbiota@sha256:<digest>
    # The tag below is overridable via QUAY_REGISTRY / IMAGE_TAG in .env
    # (see .env.alpha.example). Tags are mutable; prefer a @sha256 digest.
    image: ${QUAY_REGISTRY:-quay.io/langdon/se-symbiota}:${IMAGE_TAG:-v3.2.4-alpha}

    # ALTERNATIVE (opt-in): build from source for community deployments.
    # Comment out the `image:` line above and uncomment this block.
    # build:
    #   context: ../..  # Repository root (two dirs up from containers/)
    #   dockerfile: containers/ubuntuContainer/Dockerfile.prod
    #   platforms:
    #     - linux/amd64
    #     - linux/arm64

    container_name: symbiota-web
    ports:
      # Apache listens on 8080 inside the container (runs as non-root www-data).
      # Publish it on the host's port 80 (or HTTP_PORT) — host-side privileged
      # binding is handled by the Docker daemon, not the container process.
      - "${HTTP_PORT:-80}:8080"

    volumes:
      # Mount ONLY runtime data directories, NOT application code
      # Code is baked into the image

      # Runtime data on /mnt/symbiota/data
      - ${DATA_DIR:-/mnt/symbiota/data}/temp:/var/www/html/symbiota/temp:z
      - ${DATA_DIR:-/mnt/symbiota/data}/imglib:/var/www/html/symbiota/content/imglib:z
      - ${DATA_DIR:-/mnt/symbiota/data}/logs:/var/www/html/symbiota/content/logs:z

      # Mount .env file for environment variable sourcing
      # Default expects .env to live in containers/ (run compose from repo root or containers/)
      # Deployer can override via ENV_FILE
      - ${ENV_FILE:-./containers/.env}:/config-overlay/.env:ro,z

      # Mount entire config overlay at runtime (keep secrets out of image)
      # Entrypoint script will copy these files over the generic code
      # Config overlay from OpenStack /mnt/symbiota/app volume
      - ${CONFIG_OVERLAY_DIR:-/mnt/symbiota/app/config/alpha}:/config-overlay:ro,z

    depends_on:
      symbiota-db:
        condition: service_healthy

    networks:
      - symbiota-network

    environment:
      - APACHE_LOG_LEVEL=${APACHE_LOG_LEVEL:-warn}

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  symbiota-db:
    build:
      context: ./mysqlContainer
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64

    container_name: symbiota-db

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-symbiota}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    # No external ports exposed in production - only accessible via internal network
    # Symbiota accesses database at: symbiota-db:3306

    volumes:
      # Persistent database storage on /mnt/symbiota/data
      - ${DATA_DIR:-/mnt/symbiota/data}/mysql:/var/lib/mysql:z

      # Optional: Mount schema/backup files
      # - ${SCHEMA_SOURCE:-/mnt/symbiota/app/schema}:/source:ro,z

    networks:
      - symbiota-network

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  symbiota-network:
    driver: bridge
