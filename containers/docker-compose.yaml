version: '3.8'

services:
  symbiota:
    build:
      context: ./ubuntuContainer
      dockerfile: Dockerfile
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ${PROJECT_ROOT}:/var/www/html/symbiota:z
    depends_on:
      - symbiota-db
    networks:
      - symbiota-network

  symbiota-db:
    build:
      context: ./mysqlContainer
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql:z
      - ${SCHEMA_SOURCE}:/source:z
    networks:
      - symbiota-network

volumes:
  mysql-data:

networks:
  symbiota-network:
    external: true
