# Symbiota Development Docker Compose
#
# For local development with live code editing
# Uses bind mounts for instant code changes without rebuild

services:
  symbiota:
    build:
      context: ./ubuntuContainer
      dockerfile: Dockerfile
    container_name: symbiota-web-dev
    ports:
      # Apache listens on 8080 inside the container (non-root); publish to host.
      - "${HTTP_PORT:-8080}:8080"
    volumes:
      # Bind mount code for live editing
      - ${PROJECT_ROOT:-..}:/var/www/html/symbiota${SELINUX_FLAG}
      # Config overlay mount — PROD only. The dev image runs apache2ctl directly and has
      # no entrypoint that reads /config-overlay (see ubuntuContainer/Dockerfile), so this
      # mount is a harmless no-op in dev. CONFIG_OVERLAY_DIR (runtime overlay source) is a
      # SEPARATE variable from CONFIG_DIR (the prod build-arg in the Makefile) — finding B3.
      - ${CONFIG_OVERLAY_DIR:-./containers}/.env:/config-overlay/.env:ro${SELINUX_FLAG}
      # Separate data directories (on different filesystem for large datasets)
      # Uncomment these if using bootstrap-symbiota.sh or separate storage
      # - ${CONTENT_DIR}:/var/www/html/symbiota/content${SELINUX_FLAG}
      # - ${LOGS_DIR}:/var/www/html/symbiota/content/logs${SELINUX_FLAG}
    depends_on:
      symbiota-db:
        condition: service_healthy
    networks:
      - symbiota-network
    environment:
      - APACHE_LOG_LEVEL=debug
    restart: unless-stopped

  symbiota-db:
    build:
      context: ./mysqlContainer
      dockerfile: Dockerfile
    container_name: symbiota-db-dev
    environment:
      # Fail fast if .env is missing rather than silently using weak defaults.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-symbiota}
      MYSQL_USER: ${MYSQL_USER:?set in .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set in .env}
    ports:
      # Bind to loopback only so the dev DB is not exposed on all interfaces.
      - "127.0.0.1:${MYSQL_PORT:-33060}:3306"
    volumes:
      # Persistent database storage (use bind mount if data on separate filesystem)
      - ${MYSQL_DATA_DIR:-mysql-data}:/var/lib/mysql${SELINUX_FLAG}
      # Optional: Mount schema files for import
      - ${SCHEMA_SOURCE:-./schema}:/source${SELINUX_FLAG}
    networks:
      - symbiota-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
    driver: local

networks:
  symbiota-network:
    driver: bridge
